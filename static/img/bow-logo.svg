<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F87171"/>
      <stop offset="50%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle with subtle shadow -->
  <circle cx="60" cy="60" r="54" fill="url(#bowGradient)" filter="url(#softShadow)"/>
  
  <!-- Elegant bow tie -->
  <g transform="translate(60, 60)">
    <!-- Left wing - smooth curves -->
    <path d="M-6 -4 
             C-12 -12, -28 -20, -36 -16
             C-40 -14, -40 14, -36 16
             C-28 20, -12 12, -6 4
             Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Right wing - smooth curves -->
    <path d="M6 -4 
             C12 -12, 28 -20, 36 -16
             C40 -14, 40 14, 36 16
             C28 20, 12 12, 6 4
             Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Center knot - rounded square -->
    <rect x="-8" y="-6" width="16" height="12" rx="3" fill="white"/>
    <rect x="-5" y="-4" width="10" height="8" rx="2" fill="url(#bowGradient)" opacity="0.6"/>
  </g>
</svg>
